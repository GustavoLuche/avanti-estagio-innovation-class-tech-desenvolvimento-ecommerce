name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projeto-02-busca-perfil-github/package-lock.json

      - name: Install dependencies (projeto-02)
        working-directory: projeto-02-busca-perfil-github
        run: npm ci

      - name: Build projeto-02
        working-directory: projeto-02-busca-perfil-github
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site
          cp index.html site/
          cp -r projeto-01-desenvolvimento-layout site/
          mkdir -p site/projeto-02-busca-perfil-github
          cp -r projeto-02-busca-perfil-github/dist/. site/projeto-02-busca-perfil-github/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
